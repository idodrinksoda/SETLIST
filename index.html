<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SETLIST</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SETLIST" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />

  <!-- Cache-bust CSS so mobile always gets latest styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=12" />
  <!-- Firebase CDN SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCl2aC0esqBrkAMh1dZoYBX711sctfWc3Q",
      authDomain: "setlist-2095d.firebaseapp.com",
      projectId: "setlist-2095d",
      storageBucket: "setlist-2095d.firebasestorage.app",
      messagingSenderId: "907520660063",
      appId: "1:907520660063:web:3e95bdc265a9d72b9201ea"
      // NOTE: This client key is safe to expose in web apps, but you MUST
      // configure Firebase Security Rules in the Firebase console so that
      // only authenticated users can read/write bandData/* documents.
      // Without rules anyone who finds this key can read or overwrite your data.
    };
    firebase.initializeApp(firebaseConfig);
  </script>
</head>
<body>
  <!-- Full-screen spinner shown while Firebase resolves auth state -->
  <div id="authSpinner" aria-label="Loading SETLIST…">
    <div class="spinner-ring"></div>
    <p class="spinner-label">SETLIST</p>
  </div>

  <div id="authSection">
    <form id="loginForm" style="display:none;">
      <h1 class="login-title">SETLIST</h1>
      <input type="email" id="loginEmail" name="email" placeholder="Band Gmail" autocomplete="email" required />
      <input type="password" id="loginPassword" name="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Login</button>
      <div id="authError"></div>
    </form>
    <div id="userInfo" style="display:none;">
      <span id="userEmail"></span>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>
  <header class="tab-header">
    <span class="app-wordmark">SETLIST</span>
    <div class="tab-pills">
      <button id="tabLibrary" class="active">Library</button>
      <button id="tabSetlist">Setlist</button>
    </div>
  </header>


  <!-- ===== LIBRARY VIEW ===== -->
  <main id="libraryView">
    <h2 class="view-heading">Song Library</h2>
    <div class="library-controls">
      <div class="add-song-wrap">
        <button id="saveToLibrary">＋ Add Song</button>
        <div id="addSongPanel" class="add-song-panel">
          <input type="text" id="libSongName" placeholder="Song name" autocomplete="off" />
          <input type="text" id="libSongTime" placeholder="Duration  03:00" autocomplete="off" />
          <input type="text" id="libSongTempo" placeholder="BPM  (optional)" autocomplete="off" />
          <button id="addSongConfirm">＋ Add</button>
        </div>
      </div>
    </div>
    <ul id="libraryList"></ul>
  </main>

  <!-- ===== SETLIST VIEW ===== -->
  <main id="setlistView" class="hidden">
  <h2 class="view-heading"><span id="currentSetlistName"></span> <span id="currentSetlistMeta" class="setlist-meta"></span></h2>
    <div class="setlist-controls">
      <div class="dropdown">
  <button id="setlistDropdownBtn">🎛 Select Setlist ▾</button>
  <div id="setlistDropdown" class="dropdown-content"></div>
      </div>

      <div class="setlist-actions">
        <button id="playSetBtn">&#x25B6; Play Set</button>
        <button id="printBtn">Print</button>
        <button id="shareBtn">Share</button>
        <button id="dupSetlistBtn">Duplicate</button>
        <button id="clearAllBtn">&#x1F9F9; Clear</button>
        <button id="deleteSetlistBtn" class="delete-setlist-btn-action">&#x1F5D1;&#xFE0F; Delete</button>
      </div>
    </div>

  <ul id="setlist" role="list" aria-label="Setlist (reorder with drag-and-drop or arrow keys)"></ul>
    <div id="totalTime">Total Time: 0 min 0 s</div>
  </main>

  <template id="songTemplate">
    <li class="song-item" draggable="true" role="listitem" tabindex="0" aria-grabbed="false">
      <span class="drag-handle" title="Drag to reorder" aria-label="Drag to reorder" aria-hidden="false">≡</span>
      <span class="song-order"></span>
      <span class="song-name"></span>
      <span class="song-time"></span>
      <span class="song-tempo"></span>
      <button type="button" class="song-play-btn" aria-label="Play song" title="Play song">&#x25B6;</button>
      <button type="button" class="delete" aria-label="Delete song">&#x1F5D1;&#xFE0F;</button>
      <div class="song-player-wrap"></div>
    </li>
  </template>

  <!-- Cache-bust JS so mobile always gets latest behavior -->
  <script src="script.js?v=10"></script>

  <!-- Register service worker for PWA / offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
